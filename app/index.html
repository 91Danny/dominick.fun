<!DOCTYPE html>
<html>
<head>
    <title>Simple API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        .api-box {
            border: 1px solid #ddd;
            padding: 20px;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            margin: 10px 0;
        }
        #result {
            background: #f4f4f4;
            padding: 15px;
            border: 1px solid #ddd;
            font-family: monospace;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="api-box">
        <h2>Hello API</h2>
        <p>Returns a friendly greeting message</p>
        <button onclick="callAPI()">Call API</button>
        <div id="result"></div>
    </div>

    <script>
        function callAPI() {
            document.getElementById('result').innerHTML = '{"message": "Hello World!"}';
        }
    </script>
</body>
</html>
